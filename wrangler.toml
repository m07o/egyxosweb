name = "egyxosweb"
type = "javascript"
main = ".open-next/server"

[env.production]
name = "egyxosweb-prod"
routes = [
  { pattern = "egyxosweb.pages.dev/*", zone_name = "pages.dev" }
]

[build]
command = "bun run build:cf"
cwd = "./"
watch_paths = ["src/**/*.ts", "src/**/*.tsx", "prisma/**/*.prisma"]

[build.upload]
format = "modules"
main = ".open-next/server"

[env.preview]
name = "egyxosweb-preview"

[triggers.crons]
crons = ["0 */6 * * *"]

[[routes]]
pattern = "/"
zone_name = "example.com"

[[triggers]]
crons = ["0 0 * * 0"]

[observability]
enabled = true

[compatibility_flags]
streams_enable_constructors = true
